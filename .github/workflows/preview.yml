name: Deploy PR preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build preview
        if: github.event.action != 'closed'
        run: |
          mkdir -p _preview
          cp index.html app.js styles.css sw.js manifest.json icon-192.png icon-512.png _preview/
          sed -i "s/__CACHE_VERSION__/${GITHUB_SHA::7}/" _preview/sw.js

      - uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: _preview/
          preview-branch: gh-pages
